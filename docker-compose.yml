services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # In production behind Docker network, don't publish DB port to host.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/spl01tprivate/wrzdj-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: ${ENV:-production}
      PORT: ${PORT_API:-8000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      PUBLIC_URL: ${PUBLIC_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
      HUMAN_COOKIE_SECRET: ${HUMAN_COOKIE_SECRET}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    expose:
      - "8000"

  dashboard:
    image: ghcr.io/spl01tprivate/wrzdj-web:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      ENV: ${ENV:-production}
      PORT: ${PORT_FRONTEND:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PUBLIC_URL: ${PUBLIC_URL}
    expose:
      - "3000"

volumes:
  postgres_data:
